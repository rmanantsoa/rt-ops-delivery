apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: ./apps/base/mariadb
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    # Ici, vous pouvez surcharger les valeurs de base spécifiquement pour rt-cluster
    persistence:
      size: 9Gi
