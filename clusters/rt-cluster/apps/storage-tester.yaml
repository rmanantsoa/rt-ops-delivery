apiVersion: v1
kind: Pod
metadata:
  name: storage-tester
  namespace: default
spec:
  containers:
  - name: alpine-tool
    image: alpine:latest
    command: ["/bin/sh", "-c", "df -h && sleep infinity"]
    resources:
      limits:
        cpu: "100m"
        memory: "64Mi"
      requests:
        cpu: "50m"
        memory: "32Mi"
