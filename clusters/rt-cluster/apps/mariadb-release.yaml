apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: mariadb
      version: '19.x.x'
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    image:
      tag: 11.4.5-debian-12-r0
    auth:
      rootPassword: "rt-passwd"
      database: "rt-mdb"
    primary:
      persistence:
        enabled: true
        size: 5Gi
